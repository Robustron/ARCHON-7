<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARCHON-7 Masterclass</title>
    <link rel="stylesheet" href="./src/style.css">
  </head>
  <body>
    <div id="app">
      <h1>ARCHON-7 Setup</h1>

      <div id="setup-area">
        <div id="domain-input-group">
          <label for="domain-input">Domain (e.g., Computer Engineering):</label>
          <input type="text" id="domain-input" placeholder="Enter domain..." />
        </div>

        <div id="subject-input-group" class="hidden">
          <label for="subject-input">Subject (e.g., Cloud Computing):</label>
          <input type="text" id="subject-input" placeholder="Enter subject..." />
        </div>

        <button id="next-button">Next</button>
      </div>

      <div id="masterclass-area" class="hidden">
          <h2 id="masterclass-heading">Masterclass</h2>
          <div id="module-container">
            <!-- Module divs will be added here dynamically -->
            <!-- Example structure (will be generated by JS): -->
            <!--
            <div class="module-page" data-module-number="1">
                <div class="module-content">... Module 1 content ...</div>
                <div class="inquiry-area">
                    <textarea placeholder="Your response to the inquiry..."></textarea>
                    <button>Submit Response</button>
                </div>
            </div>
            -->
          </div>
          <div id="navigation-area">
            <button id="prev-module-button" class="hidden">Previous Module</button>
            <span id="module-counter-display"></span>
            <button id="next-module-button" class="hidden">Next Module</button>
          </div>
      </div>

    </div>
    <script type="module" src="/src/main.ts"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <script>mermaid.initialize({ startOnLoad: false });</script>
  </body>
</html>
